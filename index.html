<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 人才测评分析系统</title>
    <!-- 引入 PDF.js 库，用于在浏览器中读取 PDF 文字 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <style>
        :root { --primary: #007bff; --bg: #f4f7f6; }
        body { font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif; background: var(--bg); display: flex; justify-content: center; padding: 20px; min-height: 100vh; }
        .card { background: #fff; width: 100%; max-width: 500px; padding: 30px; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        h2 { margin: 0 0 10px; color: #1a1a1a; font-size: 22px; }
        .desc { color: #666; font-size: 14px; margin-bottom: 25px; line-height: 1.5; }
        
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: 600; color: #333; font-size: 14px; }
        input[type="text"], input[type="password"], input[type="file"] { width: 100%; padding: 12px; border: 1px solid #e0e0e0; border-radius: 8px; box-sizing: border-box; font-size: 14px; transition: all 0.2s; }
        input:focus { border-color: var(--primary); outline: none; box-shadow: 0 0 0 3px rgba(0,123,255,0.1); }
        
        button { width: 100%; padding: 14px; background: var(--primary); color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: 600; cursor: pointer; transition: background 0.2s; }
        button:hover { background: #0056b3; }
        button:disabled { background: #ccc; cursor: not-allowed; }

        #resultArea { margin-top: 25px; padding: 20px; background: #f8f9fa; border-radius: 8px; border-left: 4px solid var(--primary); display: none; }
        .loading { text-align: center; color: #666; font-size: 13px; margin-top: 10px; display: none; }
        .spinner { display: inline-block; width: 12px; height: 12px; border: 2px solid #666; border-top-color: transparent; border-radius: 50%; animation: spin 1s linear infinite; margin-right: 5px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        .api-hint { font-size: 12px; color: #888; margin-top: 5px; }
    </style>
</head>
<body>

<div class="card">
    <h2>🎯 岗位匹配度分析</h2>
    <p class="desc">上传 Harrison 测评报告，AI 将自动分析其与岗位的匹配程度。</p>

    <!-- 这里需要输入 API Key，因为 GitHub 是公开的，为了安全，让用户自己填 Key -->
    <div class="form-group">
        <label>千问 API Key (阿里云 DashScope)</label>
        <input type="password" id="apiKey" placeholder="sk-xxxxxxxxxxxxxxxx">
        <div class="api-hint">为了调用 AI 能力，需要填入您的 API Key（仅保存在本地）</div>
    </div>

    <div class="form-group">
        <label>应聘岗位</label>
        <input type="text" id="jobTitle" placeholder="例如：大客户经理">
    </div>

    <div class="form-group">
        <label>测评报告 (PDF)</label>
        <input type="file" id="pdfFile" accept="application/pdf">
    </div>

    <button id="submitBtn" onclick="startAnalysis()">开始分析</button>
    
    <div class="loading" id="loading">
        <span class="spinner"></span>正在读取 PDF 并请求 AI 分析...
    </div>

    <div id="resultArea"></div>
</div>

<script>
    // 配置千问 API 地址
    const API_URL = 'https://dashscope.aliyuncs.com/compatible-mode/v1/chat/completions';

    async function startAnalysis() {
        const apiKey = document.getElementById('apiKey').value.trim();
        const jobTitle = document.getElementById('jobTitle').value.trim();
        const fileInput = document.getElementById('pdfFile');
        const btn = document.getElementById('submitBtn');
        const loading = document.getElementById('loading');
        const resultArea = document.getElementById('resultArea');

        // 1. 基础校验
        if (!apiKey) { alert('请输入 API Key'); return; }
        if (!jobTitle) { alert('请输入岗位名称'); return; }
        if (!fileInput.files[0]) { alert('请上传 PDF 文件'); return; }

        const file = fileInput.files[0];

        // 2. 界面状态更新
        btn.disabled = true;
        btn.innerText = "分析中...";
        loading.style.display = 'block';
        resultArea.style.display = 'none';
        resultArea.innerText = '';

        try {
            // 3. 使用 PDF.js 读取文件内容
            const arrayBuffer = await file.arrayBuffer();
            const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
            let fullText = "";

            // 遍历所有页面提取文字
            for (let i = 1; i <= pdf.numPages; i++) {
                const page = await pdf.getPage(i);
                const textContent = await page.getTextContent();
                const pageText = textContent.items.map(item => item.str).join(' ');
                fullText += pageText + "\n";
            }

            if (fullText.length < 50) {
                alert("无法从 PDF 中提取足够的文字，请检查文件是否为扫描件/图片。");
                resetBtn();
                return;
            }

            // 4. 构建发给千问的提示词
            const prompt = `
            你是一位资深的人力资源专家。
            应聘岗位：${jobTitle}
            
            以下是候选人的测评报告内容：
            """
            ${fullText.substring(0, 8000)} 
            """
            (注意：如果报告内容被截断，请基于已有信息分析)
            
            请根据岗位要求和报告内容，进行深度匹配分析。
            输出格式要求：
            1. **匹配度评分** (0-100分)
            2. **核心优势** (列出3点)
            3. **潜在风险/短板** (列出3点)
            4. **面试建议** (针对该岗位，建议询问的2个关键问题)
            `;

            // 5. 调用千问 API
            const response = await fetch(API_URL, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${apiKey}`
                },
                body: JSON.stringify({
                    model: "qwen-plus", // 使用 qwen-plus 模型
                    messages: [
                        { role: "system", content: "你是一个专业的人才测评分析助手。" },
                        { role: "user", content: prompt }
                    ]
                })
            });

            const data = await response.json();
            
            if (data.choices && data.choices.length > 0) {
                const aiContent = data.choices[0].message.content;
                // 将 Markdown 格式的换行转换为 HTML 换行
                resultArea.innerHTML = aiContent.replace(/\n/g, '<br>');
                resultArea.style.display = 'block';
            } else {
                alert('AI 分析失败：' + JSON.stringify(data));
            }

        } catch (error) {
            console.error(error);
            alert('发生错误：' + error.message);
        } finally {
            resetBtn();
        }
    }

    function resetBtn() {
        const btn = document.getElementById('submitBtn');
        btn.disabled = false;
        btn.innerText = "开始分析";
        document.getElementById('loading').style.display = 'none';
    }
</script>

</body>
</html>
